<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | EduSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        body {
            background: #f8fafc;
            color: #1e293b;
        }
        .header {
            background: linear-gradient(135deg, #F15A22, #FF7A00);
            padding: 20px 5%;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(241, 90, 34, 0.2);
        }
        .container {
            padding: 40px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f1f5f9;
            font-weight: 700;
            color: #64748b;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .status-badge {
            background: #dcfce7;
            color: #166534;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>EduSphere Admin</h2>
        <a href="index.html" style="color: white; text-decoration: none; font-weight: 600;">&larr; Back to Home</a>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="margin-bottom: 10px;">Registered Users Database</h2>
            <p style="color: #64748b; margin-bottom: 20px;">Real-time view of users registered in the SQLite database.</p>
            
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Full Name</th>
                        <th>Email Address</th>
                        <th>Registration Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="5" style="text-align: center;">Loading users from database...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const response = await fetch("http://localhost:5000/api/users");
                const data = await response.json();
                
                const tableBody = document.getElementById("userTableBody");
                tableBody.innerHTML = "";

                if (data.success && data.users.length > 0) {
                    data.users.forEach(user => {
                        const date = new Date(user.created_at).toLocaleString();
                        tableBody.innerHTML += `
                            <tr>
                                <td>#${user.id}</td>
                                <td style="font-weight: 600;">${user.name}</td>
                                <td>${user.email}</td>
                                <td style="color: #64748b;">${date}</td>
                                <td><span class="status-badge">Active</span></td>
                            </tr>
                        `;
                    });
                } else {
                    tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #64748b;">No users registered yet.</td></tr>';
                }
            } catch (error) {
                console.error("Error fetching users:", error);
                document.getElementById("userTableBody").innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Failed to connect to backend database. Is server.js running?</td></tr>';
            }
        });
    </script>
</body>
</html>
