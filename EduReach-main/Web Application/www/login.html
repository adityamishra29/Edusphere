<!DOCTYPE html>
<html>
<head>
	<link rel="shortcut icon" type="png" href="images/icon/favicon.png">
	<title>Login SignUp</title>
	<link rel="stylesheet" type="text/css" href="loginStyle.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

<!-- It will redirect to the Home Page after submitting the form -->
<!-- Scripts will be handled in script.js to connect to backend -->
    
</head>
<body>
		<div class="form-box">
			<div class="brand-title">
				<h1>EduSphere</h1>
				<p>SIH 25019 - Rural Education Portal</p>
			</div>
			<div class="button-box">
				<div id="btn"></div>
				<button type="button" class="toggle-btn" id="log" onclick="login()" style="color: #fff;">Log In</button>
				<button type="button" class="toggle-btn" id="reg" onclick="register()">Register</button>
			</div>
			<div class="social-icons">
				<img src="images/icon/fb2.png">
				<img src="images/icon/insta2.png">
				<img src="images/icon/tt2.png">
			</div>
			
			<!-- Login Form -->
			<form id="login" class="input-group" action="index.html">
				<div class="inp">
					<img src="images/icon/user.png"><input type="text" id="email" class="input-field" placeholder="Username or Phone Number" style="width: 88%; border:none;" required="required">
				</div>
				<div class="inp">
					<img src="images/icon/password.png"><input type="password" id="password" class="input-field" placeholder="Password" style="width: 88%; border: none;" required="required">
				</div>
				<input type="checkbox" class="check-box">Remember Password
				<button type="submit" class="submit-btn">Log In</button>
			</form>


			<div class="other" id="other">
				<div class="instead">
					<h3>or</h3>
				</div>
				<button class="connect" onclick="google()">
					<img src="images/icon/google.png"><span>Sign in with Google</span>
				</button>
			</div>
			
			<!-- Registration Form -->
			<form id="register" class="input-group">
				<div class="inp">
					<input type="text" id="reg-name" class="input-field" placeholder="Full Name" required="required">
				</div>
				<div class="inp">
					<input type="email" id="reg-email" class="input-field" placeholder="Email Address" required="required">
				</div>
				<div class="inp">
					<input type="password" id="reg-pass" class="input-field" placeholder="Create Password" required="required">
				</div>
				<div class="inp">
					<input type="password" id="reg-pass-confirm" class="input-field" placeholder="Confirm Password" required="required">
				</div>
				<div style="display: flex; align-items: center; margin-bottom: 25px; margin-top: 5px;">
					<input type="checkbox" class="check-box" id="chkAgree" onclick="goFurther()" style="margin: 0 10px 0 0;">
					<span style="font-weight: 600; color: #1e293b; font-size: 13px;">I agree to the Terms & Conditions</span>
				</div>
				<button type="submit" id="btnSubmit" class="submit-btn reg-btn">Register</button>
			</form>
		</div>
		<script type="text/javascript" src="script.js"></script>
</body>
</html>
